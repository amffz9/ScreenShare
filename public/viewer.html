<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Viewer — ScreenShare</title>
    <link rel="icon" type="image/x-icon" href="/favicon.ico">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/style.css">
</head>

<body>
    <div class="page">
        <!-- Navbar -->
        <nav class="navbar">
            <a href="/">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
                Home
            </a>
            <span class="navbar-title">Viewer</span>
            <span id="navStatus" class="status-dot status-dot--connecting"></span>
        </nav>

        <div class="container">
            <!-- Status -->
            <div id="status" class="status-bar info" role="status" aria-live="polite">Connecting to server...</div>

            <!-- Broadcaster List -->
            <div id="broadcasterSection" class="section hidden">
                <div class="section-header">
                    <h3>Available Broadcasts</h3>
                    <button id="refreshBtn" class="btn btn-ghost btn-sm">
                        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></svg>
                        Refresh
                    </button>
                </div>
                <div id="broadcasterList">
                    <div class="empty-state">
                        <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="3" width="20" height="14" rx="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg>
                        <p>Loading...</p>
                    </div>
                </div>

                <div class="mt-md">
                    <button id="castBtn" class="btn btn-accent btn-block hidden">
                        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 16.1A5 5 0 0 1 5.9 20M2 12.05A9 9 0 0 1 9.95 20M2 8V6a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v12a2 2 0 0 1-2 2h-6"/><line x1="2" y1="20" x2="2.01" y2="20"/></svg>
                        Cast to TV
                    </button>
                </div>
            </div>

            <!-- Video Section -->
            <div id="videoSection" class="section hidden">
                <div class="video-wrapper">
                    <video id="remoteVideo" autoplay playsinline></video>
                </div>
                <div class="video-controls mt-sm">
                    <button id="fullscreenBtn" class="btn btn-secondary">
                        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 3 21 3 21 9"/><polyline points="9 21 3 21 3 15"/><line x1="21" y1="3" x2="14" y2="10"/><line x1="3" y1="21" x2="10" y2="14"/></svg>
                        Fullscreen
                    </button>
                    <button id="disconnectBtn" class="btn btn-danger">
                        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
                        Disconnect
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script src="/common.js"></script>
    <script>
        // Setup Cast
        setupCastButton('castBtn', window.location.href);

        // Core App Logic
        let ws = null;
        let myId = null;
        let peerConnection = null;
        let currentBroadcasterId = null;
        let shouldReconnect = true;
        let reconnectTimer = null;
        let rtcConfig = null;
        const rtcConfigReady = fetchRtcConfig().then(cfg => { rtcConfig = cfg; });

        const refreshBtn = document.getElementById('refreshBtn');
        const broadcasterList = document.getElementById('broadcasterList');
        const remoteVideo = document.getElementById('remoteVideo');
        const fullscreenBtn = document.getElementById('fullscreenBtn');
        const disconnectBtn = document.getElementById('disconnectBtn');
        const broadcasterSection = document.getElementById('broadcasterSection');
        const navStatus = document.getElementById('navStatus');

        function setNavStatus(state) {
            navStatus.className = 'status-dot status-dot--' + state;
        }

        // Connect to signaling server
        function connectToServer() {
            // Cancel any pending reconnect timer
            if (reconnectTimer) {
                clearTimeout(reconnectTimer);
                reconnectTimer = null;
            }
            // Don't open a new socket if one is already connecting or open
            if (ws && (ws.readyState === WebSocket.CONNECTING || ws.readyState === WebSocket.OPEN)) {
                return;
            }
            try {
                const wsUrl = getWebSocketUrl();
                ws = new WebSocket(wsUrl);

                ws.onopen = () => {
                    showStatus('Connected! Registering...', 'success');
                    setNavStatus('live');
                    ws.send(JSON.stringify({ type: 'register-viewer' }));
                };

                ws.onmessage = (event) => {
                    handleSignalingMessage(JSON.parse(event.data));
                };

                ws.onerror = (error) => {
                    console.error('WebSocket error:', error);
                    showStatus('Connection error. Check server is running.', 'error');
                    setNavStatus('offline');
                };

                ws.onclose = () => {
                    showStatus('Disconnected. Retrying in 3s...', 'error');
                    setNavStatus('connecting');
                    broadcasterSection.classList.add('hidden');
                    if (shouldReconnect && !reconnectTimer) {
                        reconnectTimer = setTimeout(() => {
                            reconnectTimer = null;
                            connectToServer();
                        }, 3000);
                    }
                };
            } catch (err) {
                showStatus('Error connecting: ' + err.message, 'error');
            }
        }

        // Start connection on load
        connectToServer();

        // Handle messages from signaling server
        function handleSignalingMessage(message) {
            console.log('Received message:', message.type);

            switch (message.type) {
                case 'registered':
                    myId = message.id;
                    showStatus('Connected — select a broadcast to watch', 'success');
                    setNavStatus('live');
                    broadcasterSection.classList.remove('hidden');
                    ws.send(JSON.stringify({ type: 'get-broadcasters' }));
                    break;
                case 'broadcaster-list':
                    displayBroadcasters(message.broadcasters);
                    break;
                case 'broadcaster-joined':
                    ws.send(JSON.stringify({ type: 'get-broadcasters' }));
                    break;
                case 'broadcaster-left':
                    ws.send(JSON.stringify({ type: 'get-broadcasters' }));
                    if (currentBroadcasterId === message.id) {
                        disconnect();
                        showStatus('Broadcaster disconnected', 'error');
                    }
                    break;
                case 'answer':
                    handleBroadcasterAnswer(message.answer);
                    break;
                case 'ice-candidate':
                    handleBroadcasterIceCandidate(message.candidate);
                    break;
            }
        }

        // Display list of broadcasters
        function displayBroadcasters(broadcasters) {
            if (broadcasters.length === 0) {
                broadcasterList.innerHTML = `
                    <div class="empty-state">
                        <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="3" width="20" height="14" rx="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg>
                        <p>No active broadcasts</p>
                    </div>`;
                return;
            }

            broadcasterList.innerHTML = broadcasters.map(b => `
                <div class="broadcaster-card" onclick="connectToBroadcaster('${escapeHtml(b.id)}')" data-id="${escapeHtml(b.id)}">
                    <div class="icon-circle">
                        <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4.9 19.1C1 15.2 1 8.8 4.9 4.9"/><path d="M7.8 16.2c-2.3-2.3-2.3-6.1 0-8.4"/><circle cx="12" cy="12" r="2"/><path d="M16.2 7.8c2.3 2.3 2.3 6.1 0 8.4"/><path d="M19.1 4.9C23 8.8 23 15.1 19.1 19"/></svg>
                    </div>
                    <div class="broadcaster-card-info">
                        <div class="broadcaster-card-name">${escapeHtml(b.name)}</div>
                        <div class="broadcaster-card-status">
                            <span class="status-dot status-dot--live"></span>
                            Live
                        </div>
                    </div>
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="var(--color-text-muted)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
                </div>
            `).join('');
        }

        // Connect to a specific broadcaster
        window.connectToBroadcaster = async function (broadcasterId) {
            if (peerConnection) disconnect();

            try {
                currentBroadcasterId = broadcasterId;
                showStatus('Connecting to broadcast...', 'info');
                setNavStatus('connecting');
                await rtcConfigReady;

                peerConnection = new RTCPeerConnection(rtcConfig);
                peerConnection.addTransceiver('video', { direction: 'recvonly' });
                peerConnection.addTransceiver('audio', { direction: 'recvonly' });

                peerConnection.ontrack = (event) => {
                    console.log('Received remote track:', event.track.kind);
                    if (!remoteVideo.srcObject) {
                        remoteVideo.srcObject = event.streams[0];
                    }
                    document.getElementById('videoSection').classList.remove('hidden');
                    broadcasterSection.classList.add('hidden');
                    setNavStatus('live');
                    // Ensure playback starts (autoplay may be blocked with audio)
                    remoteVideo.play().catch(e => {
                        console.warn('Autoplay blocked, trying muted:', e);
                        remoteVideo.muted = true;
                        remoteVideo.play().then(() => {
                            showStatus('Watching (muted — click video to unmute)', 'success');
                            remoteVideo.addEventListener('click', () => { remoteVideo.muted = false; }, { once: true });
                        }).catch(e2 => console.error('Playback failed:', e2));
                    });
                    // Debounce status update to wait for all tracks to arrive
                    clearTimeout(peerConnection._trackStatusTimer);
                    peerConnection._trackStatusTimer = setTimeout(() => {
                        const stream = remoteVideo.srcObject;
                        if (stream && !remoteVideo.muted) {
                            const hasAudio = stream.getAudioTracks().length > 0;
                            showStatus('Watching — ' + (hasAudio ? 'video + audio' : 'video only'), 'success');
                        }
                    }, 200);
                };

                peerConnection.onicecandidate = (event) => {
                    if (event.candidate) {
                        ws.send(JSON.stringify({
                            type: 'ice-candidate',
                            to: broadcasterId,
                            candidate: event.candidate
                        }));
                    }
                };

                peerConnection.onconnectionstatechange = () => {
                    console.log('Connection state:', peerConnection.connectionState);
                    if (peerConnection.connectionState === 'disconnected' ||
                        peerConnection.connectionState === 'failed') {
                        showStatus('Connection lost', 'error');
                        setNavStatus('offline');
                        disconnect();
                    }
                };

                const offer = await peerConnection.createOffer();
                await peerConnection.setLocalDescription(offer);

                ws.send(JSON.stringify({
                    type: 'offer',
                    to: broadcasterId,
                    offer: peerConnection.localDescription
                }));

                console.log('Sent offer to broadcaster');
            } catch (err) {
                showStatus('Error connecting: ' + err.message, 'error');
                console.error(err);
            }
        };

        async function handleBroadcasterAnswer(answer) {
            if (peerConnection) {
                try {
                    await peerConnection.setRemoteDescription(answer);
                    console.log('Set remote description from broadcaster');
                } catch (err) {
                    console.error('Error setting remote description:', err);
                }
            }
        }

        async function handleBroadcasterIceCandidate(candidate) {
            if (peerConnection) {
                try {
                    await peerConnection.addIceCandidate(candidate);
                } catch (err) {
                    console.error('Error adding ICE candidate:', err);
                }
            }
        }

        refreshBtn.addEventListener('click', () => {
            if (ws && ws.readyState === WebSocket.OPEN) {
                ws.send(JSON.stringify({ type: 'get-broadcasters' }));
                showStatus('Refreshing...', 'info');
            } else {
                connectToServer();
            }
        });

        fullscreenBtn.addEventListener('click', () => {
            if (!document.fullscreenElement) {
                remoteVideo.requestFullscreen().catch(err => {
                    console.error('Error entering fullscreen:', err);
                });
            } else {
                document.exitFullscreen();
            }
        });

        disconnectBtn.addEventListener('click', () => {
            disconnect();
            broadcasterSection.classList.remove('hidden');
        });

        function disconnect() {
            if (peerConnection) {
                peerConnection.close();
                peerConnection = null;
            }
            remoteVideo.srcObject = null;
            document.getElementById('videoSection').classList.add('hidden');
            currentBroadcasterId = null;
            showStatus('Disconnected', 'info');
            setNavStatus('live');
        }

        window.addEventListener('beforeunload', () => {
            shouldReconnect = false;
            if (reconnectTimer) clearTimeout(reconnectTimer);
            if (peerConnection) peerConnection.close();
            if (ws) ws.close();
        });
    </script>
</body>

</html>
