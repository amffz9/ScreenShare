<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ScreenShare</title>
    <link rel="icon" type="image/x-icon" href="/favicon.ico">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/style.css">
</head>

<body>
    <div class="page-center">
        <div style="width: 100%; max-width: 540px; padding: var(--spacing-md);">

            <!-- Hero -->
            <div class="text-center" style="margin-bottom: var(--spacing-xl);">
                <h1 style="margin-bottom: var(--spacing-sm);">ScreenShare</h1>
                <p>Share your screen over the local network. No installs needed for viewers.</p>
            </div>

            <!-- Action Cards -->
            <div class="action-grid">
                <a href="/broadcaster" class="action-card action-card--broadcast">
                    <div class="icon-circle">
                        <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="3" width="20" height="14" rx="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg>
                    </div>
                    <h2>Broadcast</h2>
                    <p>Share your screen or a capture device with viewers</p>
                </a>

                <a href="/viewer" class="action-card action-card--watch">
                    <div class="icon-circle">
                        <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                    </div>
                    <h2>Watch</h2>
                    <p>Connect to a broadcaster and view their screen</p>
                </a>
            </div>

            <!-- QR Code -->
            <div class="qr-section mt-lg">
                <img src="/qr" alt="QR code to open viewer">
                <p>Scan to open viewer on your phone</p>
            </div>

        </div>
    </div>
</body>

</html>
