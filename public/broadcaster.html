<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Broadcast — ScreenShare</title>
    <link rel="icon" type="image/x-icon" href="/favicon.ico">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/style.css">
</head>

<body>
    <div class="page">
        <!-- Navbar -->
        <nav class="navbar">
            <a href="/">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
                Home
            </a>
            <span class="navbar-title">Broadcast</span>
            <span id="navStatus" class="status-dot status-dot--offline"></span>
        </nav>

        <div class="container">
            <!-- Status -->
            <div id="status" class="status-bar" role="status" aria-live="polite"></div>

            <!-- Setup Section -->
            <div id="setupSection" class="section">
                <div class="card">
                    <div class="form-group">
                        <label class="form-label" for="broadcasterName">Display Name</label>
                        <input type="text" id="broadcasterName" class="form-input" placeholder="My Screen" value="My Screen">
                    </div>

                    <div class="form-group">
                        <label class="form-label" for="sourceType">Source</label>
                        <select id="sourceType" class="form-select">
                            <option value="screen">Screen Share</option>
                            <option value="device">Capture Device (HDMI/USB)</option>
                        </select>
                    </div>

                    <div id="deviceSelectors" class="form-panel hidden">
                        <div class="form-group">
                            <label class="form-label" for="videoDevice">Video Device</label>
                            <select id="videoDevice" class="form-select"></select>
                        </div>
                        <div class="form-group" style="margin-bottom: 0;">
                            <label class="form-label" for="audioDevice">Audio Device</label>
                            <select id="audioDevice" class="form-select">
                                <option value="none">No Audio</option>
                            </select>
                        </div>
                    </div>

                    <div class="form-group">
                        <label class="form-check">
                            <input type="checkbox" id="includeAudio" checked>
                            Include audio (when available)
                        </label>
                    </div>

                    <div class="form-group" style="margin-bottom: 0;">
                        <p class="form-hint">
                            <strong>Server:</strong> <span id="serverIp">Detecting...</span>
                        </p>
                    </div>
                </div>

                <!-- Actions -->
                <div class="mt-md btn-group">
                    <button id="startBtn" class="btn btn-primary btn-lg btn-block">
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polygon points="10 8 16 12 10 16 10 8"/></svg>
                        Start Broadcasting
                    </button>
                </div>

                <div class="mt-sm btn-group">
                    <button id="castBtn" class="btn btn-accent btn-block hidden">
                        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 16.1A5 5 0 0 1 5.9 20M2 12.05A9 9 0 0 1 9.95 20M2 8V6a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v12a2 2 0 0 1-2 2h-6"/><line x1="2" y1="20" x2="2.01" y2="20"/></svg>
                        Cast Viewer to TV
                    </button>
                </div>
            </div>

            <!-- Live Section (hidden until broadcasting) -->
            <div id="broadcastSection" class="hidden">
                <!-- Stop button -->
                <div class="section">
                    <button id="stopBtn" class="btn btn-danger btn-block">
                        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/></svg>
                        Stop Broadcasting
                    </button>
                </div>

                <!-- Preview -->
                <div id="previewSection" class="section hidden">
                    <h3 style="margin-bottom: var(--spacing-sm);">Preview</h3>
                    <div class="video-wrapper">
                        <video id="preview" autoplay muted playsinline></video>
                    </div>
                </div>

                <!-- Viewers -->
                <div id="viewersSection" class="section hidden">
                    <div class="section-header">
                        <h3>Viewers</h3>
                        <span id="viewerCount" class="text-sm text-muted">0 connected</span>
                    </div>
                    <div id="viewersList" class="viewers-grid">
                        <span class="text-sm text-muted">No viewers yet</span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="/common.js"></script>
    <script>
        // Init shared logic
        fetchAndDisplayIp('serverIp');

        // Setup Cast: Cast the Viewer page to the TV
        const viewerUrl = new URL('viewer', window.location.href).href;
        setupCastButton('castBtn', viewerUrl);

        // Core App Logic
        let ws = null;
        let myId = null;
        const viewerConnections = new Map();
        let screenStream = null;
        let rtcConfig = null;
        const rtcConfigReady = fetchRtcConfig().then(cfg => { rtcConfig = cfg; });

        const broadcasterName = document.getElementById('broadcasterName');
        const startBtn = document.getElementById('startBtn');
        const stopBtn = document.getElementById('stopBtn');
        const preview = document.getElementById('preview');
        const viewersList = document.getElementById('viewersList');
        const sourceType = document.getElementById('sourceType');
        const deviceSelectors = document.getElementById('deviceSelectors');
        const videoDeviceSelect = document.getElementById('videoDevice');
        const audioDeviceSelect = document.getElementById('audioDevice');
        const includeAudio = document.getElementById('includeAudio');
        const navStatus = document.getElementById('navStatus');

        function setNavStatus(state) {
            navStatus.className = 'status-dot status-dot--' + state;
        }

        // Show/hide device selectors based on source type
        sourceType.addEventListener('change', async () => {
            if (sourceType.value === 'device') {
                deviceSelectors.classList.remove('hidden');
                await enumerateDevices();
            } else {
                deviceSelectors.classList.add('hidden');
            }
        });

        // Enumerate available media devices
        async function enumerateDevices() {
            try {
                const tempStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true }).catch(() => null);

                const devices = await navigator.mediaDevices.enumerateDevices();

                videoDeviceSelect.innerHTML = '';
                audioDeviceSelect.innerHTML = '<option value="none">No Audio</option>';

                devices.filter(d => d.kind === 'videoinput').forEach(d => {
                    const opt = document.createElement('option');
                    opt.value = d.deviceId;
                    opt.textContent = d.label || `Camera ${videoDeviceSelect.length + 1}`;
                    videoDeviceSelect.appendChild(opt);
                });

                devices.filter(d => d.kind === 'audioinput').forEach(d => {
                    const opt = document.createElement('option');
                    opt.value = d.deviceId;
                    opt.textContent = d.label || `Microphone ${audioDeviceSelect.length}`;
                    audioDeviceSelect.appendChild(opt);
                });

                if (tempStream) tempStream.getTracks().forEach(t => t.stop());

                if (videoDeviceSelect.options.length === 0) {
                    showStatus('No video capture devices found', 'error');
                }
            } catch (err) {
                console.error('Error enumerating devices:', err);
                showStatus('Could not list devices: ' + err.message, 'error');
            }
        }

        // Connect to signaling server
        function connectToServer() {
            return new Promise((resolve, reject) => {
                if (ws && (ws.readyState === WebSocket.CONNECTING || ws.readyState === WebSocket.OPEN)) {
                    resolve();
                    return;
                }

                const wsUrl = getWebSocketUrl();
                ws = new WebSocket(wsUrl);

                ws.onopen = () => {
                    console.log('Connected to signaling server');
                    resolve();
                };

                ws.onmessage = (event) => {
                    handleSignalingMessage(JSON.parse(event.data));
                };

                ws.onerror = (error) => {
                    console.error('WebSocket error:', error);
                    showStatus('Connection error. Check server is running.', 'error');
                    setNavStatus('offline');
                    reject(error);
                };

                ws.onclose = () => {
                    showStatus('Disconnected from server', 'error');
                    setNavStatus('offline');
                    document.getElementById('broadcastSection').classList.add('hidden');
                    document.getElementById('setupSection').classList.remove('hidden');
                    startBtn.disabled = false;
                };
            });
        }

        // Handle messages from signaling server
        function handleSignalingMessage(message) {
            console.log('Received message:', message.type);

            switch (message.type) {
                case 'registered':
                    myId = message.id;
                    showStatus(`Broadcasting as "${message.name}"`, 'success');
                    setNavStatus('live');
                    document.getElementById('broadcastSection').classList.remove('hidden');
                    document.getElementById('setupSection').classList.add('hidden');
                    break;
                case 'offer':
                    handleViewerOffer(message.from, message.offer);
                    break;
                case 'ice-candidate':
                    handleViewerIceCandidate(message.from, message.candidate);
                    break;
            }
        }

        // Handle offer from a viewer
        async function handleViewerOffer(viewerId, offer) {
            console.log('Received offer from viewer:', viewerId);
            try {
                const pc = new RTCPeerConnection(rtcConfig);
                viewerConnections.set(viewerId, pc);

                if (screenStream) {
                    screenStream.getTracks().forEach(track => pc.addTrack(track, screenStream));
                }

                pc.onicecandidate = (event) => {
                    if (event.candidate) {
                        ws.send(JSON.stringify({
                            type: 'ice-candidate',
                            to: viewerId,
                            candidate: event.candidate
                        }));
                    }
                };

                pc.onconnectionstatechange = () => {
                    updateViewersList();
                    if (pc.connectionState === 'disconnected' || pc.connectionState === 'failed') {
                        viewerConnections.delete(viewerId);
                        updateViewersList();
                    }
                };

                await pc.setRemoteDescription(offer);
                const answer = await pc.createAnswer();
                await pc.setLocalDescription(answer);

                ws.send(JSON.stringify({
                    type: 'answer',
                    to: viewerId,
                    answer: pc.localDescription
                }));
                updateViewersList();
            } catch (err) {
                console.error('Error handling viewer offer:', err);
            }
        }

        async function handleViewerIceCandidate(viewerId, candidate) {
            const pc = viewerConnections.get(viewerId);
            if (pc) {
                try {
                    await pc.addIceCandidate(candidate);
                } catch (err) { console.error(err); }
            }
        }

        startBtn.addEventListener('click', async () => {
            startBtn.disabled = true;
            const name = broadcasterName.value.trim() || 'Unnamed Broadcaster';
            try {
                showStatus('Connecting to server...', 'info');
                setNavStatus('connecting');
                await rtcConfigReady;
                await connectToServer();

                const wantAudio = includeAudio.checked;

                if (sourceType.value === 'device') {
                    const videoId = videoDeviceSelect.value;
                    const audioId = audioDeviceSelect.value;

                    const constraints = {
                        video: videoId ? { deviceId: { exact: videoId } } : true,
                        audio: audioId !== 'none' && wantAudio ? { deviceId: { exact: audioId } } : false,
                    };

                    try {
                        screenStream = await navigator.mediaDevices.getUserMedia(constraints);
                    } catch (exactErr) {
                        console.warn('Exact device constraint failed, retrying with ideal:', exactErr);
                        constraints.video = videoId ? { deviceId: { ideal: videoId } } : true;
                        if (audioId !== 'none' && wantAudio) {
                            constraints.audio = { deviceId: { ideal: audioId } };
                        }
                        screenStream = await navigator.mediaDevices.getUserMedia(constraints);
                    }
                } else {
                    screenStream = await navigator.mediaDevices.getDisplayMedia({
                        video: { cursor: 'always' },
                        audio: wantAudio,
                    });
                }

                const vTrack = screenStream.getVideoTracks()[0];
                console.log('Video track:', vTrack.label, 'state:', vTrack.readyState, 'settings:', JSON.stringify(vTrack.getSettings()));
                vTrack.onended = () => stopBroadcasting();

                preview.srcObject = screenStream;
                preview.muted = true;
                preview.play().catch(e => console.warn('Preview autoplay blocked:', e));
                document.getElementById('previewSection').classList.remove('hidden');
                document.getElementById('viewersSection').classList.remove('hidden');

                ws.send(JSON.stringify({
                    type: 'register-broadcaster',
                    name: name
                }));
            } catch (err) {
                console.error(err);
                setNavStatus('offline');
                if (err.name === 'NotAllowedError') {
                    showStatus('Screen sharing cancelled', 'info');
                } else if (err.name === 'NotFoundError') {
                    showStatus('Selected device not found. Is it connected?', 'error');
                } else if (err.name === 'NotReadableError') {
                    showStatus('Device is in use by another application', 'error');
                } else {
                    showStatus('Error starting broadcast: ' + err.message, 'error');
                }
            }
        });

        function stopBroadcasting() {
            if (screenStream) {
                screenStream.getTracks().forEach(track => track.stop());
                screenStream = null;
            }
            viewerConnections.forEach((pc) => pc.close());
            viewerConnections.clear();

            if (ws) {
                ws.close();
                ws = null;
            }
            preview.srcObject = null;
            document.getElementById('broadcastSection').classList.add('hidden');
            document.getElementById('setupSection').classList.remove('hidden');
            document.getElementById('previewSection').classList.add('hidden');
            document.getElementById('viewersSection').classList.add('hidden');

            startBtn.disabled = false;
            setNavStatus('offline');
            showStatus('Broadcasting stopped', 'info');
            updateViewersList();
        }

        stopBtn.addEventListener('click', stopBroadcasting);

        function updateViewersList() {
            const connectedViewers = Array.from(viewerConnections.entries())
                .filter(([id, pc]) => pc.connectionState === 'connected' || pc.connectionState === 'connecting');

            const countEl = document.getElementById('viewerCount');
            countEl.textContent = connectedViewers.length + ' connected';

            if (connectedViewers.length === 0) {
                viewersList.innerHTML = '<span class="text-sm text-muted">No viewers yet</span>';
            } else {
                viewersList.innerHTML = connectedViewers.map(([id, pc]) => `
                    <span class="viewer-badge">
                        <span class="status-dot status-dot--live"></span>
                        Viewer ${escapeHtml(id.substring(0, 6))}
                    </span>
                `).join('');
            }
        }

        window.addEventListener('beforeunload', () => {
            if (screenStream) screenStream.getTracks().forEach(track => track.stop());
            viewerConnections.forEach(pc => pc.close());
            if (ws) ws.close();
        });
    </script>
</body>

</html>
